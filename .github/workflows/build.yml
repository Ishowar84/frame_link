name: Build FrameLink

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build
        run: |
          cd scrcpy_gui
          flutter pub get
          flutter build windows --release
      - name: Create MSIX (Optional)
        continue-on-error: true
        run: |
          cd scrcpy_gui
          flutter pub run msix:create
      - name: Archive Windows
        shell: bash
        run: |
          cd scrcpy_gui/build/windows/x64/runner/Release/
          zip -r ../../../../../FrameLink-Windows.zip .
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: FrameLink-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Build
        run: |
          cd scrcpy_gui
          flutter pub get
          flutter build linux --release
      - name: Prepare Package
        run: |
          mkdir package
          cp -r scrcpy_gui/build/linux/x64/release/bundle/* package/
          cp scrcpy_gui/setup_linux.sh package/
          chmod +x package/setup_linux.sh
          zip -r FrameLink-Linux.zip package/
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: FrameLink-Linux.zip

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-build
      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-build
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          files: |
            FrameLink-Windows.zip
            FrameLink-Linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
