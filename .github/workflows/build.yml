name: Build FrameLink

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: |
          cd scrcpy_gui
          flutter pub get
          
      - name: Build Windows
        run: |
          cd scrcpy_gui
          flutter build windows --release
          
      - name: Create MSIX Installer
        run: |
          cd scrcpy_gui
          flutter pub run msix:create
          
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: FrameLink-Windows
          path: scrcpy_gui/build/windows/x64/runner/Release/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          
      - name: Install Flutter Dependencies
        run: |
          cd scrcpy_gui
          flutter pub get
          
      - name: Build Linux
        run: |
          cd scrcpy_gui
          flutter build linux --release
          
      - name: Prepare Linux Package
        run: |
          mkdir -p package/
          cp -r scrcpy_gui/build/linux/x64/release/bundle/* package/
          cp scrcpy_gui/setup_linux.sh package/
          chmod +x package/setup_linux.sh
          
      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: FrameLink-Linux
          path: package/
