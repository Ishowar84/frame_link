name: frame_link
description: A beautiful GUI wrapper for scrcpy - Android screen mirroring tool
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  
  # State Management
  provider: ^6.1.1
  
  # Process Management
  process_run: ^1.1.0
  
  # QR Code
  qr_flutter: ^4.1.0
  
  # Network & Device Info
  network_info_plus: ^6.0.0
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  path: ^1.9.0
  
  # Window Management
  window_manager: ^0.4.3
  
  # Utilities
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  msix: ^3.16.7

flutter_launcher_icons:
  android: false # We are focusing on Desktop first
  ios: false
  windows:
    generate: true
    image_path: "assets/images/frame_link.png"
    icon_size: 256

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

# Windows app configuration
msix_config:
  display_name: FrameLink
  publisher_display_name: FrameLink Team
  identity_name: com.framelink.app
  msix_version: 1.0.0.0
  logo_path: assets/images/frame_link.png
  capabilities: internetClient, networkingVpnClient
